name: Build and Release EasyScanlate

# Workflow Trigger
on:
  workflow_dispatch:

jobs:

  build-main-app:
    runs-on: windows-latest
    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyside6 google-genai markdown

      - name: Build Executable with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          script-name: main.py
          mode: standalone
          include-data-dir: 'extensions/=extensions/'
          include-package: |
            markdown
            sqlite3
          mingw64: true
          enable-plugins: pyside6
          company-name: "Liiesl"
          product-name: "NeverLiie"
          file-description: "NeverLiie Launcher"
          file-version: "0.0.27"
          product-version: "0.0.27"

      - name: Zip Main Build Output
        run: |
          cd build/main.dist
          7z a -t7z -mx=9 -mf=off ..\..\main-app-build.7z *
          cd ..\..
        shell: pwsh

      - name: Upload Main Build as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-app-build
          path: main-app-build.7z